# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include ~/.cache/hellwal/colors-kitty.conf
# END_KITTY_THEME
#

font_family Caskaydia Cove Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14

background_opacity 0.85

map cmod+c copy_to_clipboard
map cmod+v paste_from_clipboard
map shift+insert paste_from_clipboard
#cursor_trail 2
#cursor_trail_decay 0.1 0.3
