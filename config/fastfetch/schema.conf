
# Fastfetch configuration based on your Neofetch theme

# Info Sections
show_cpu="true"
show_gpu="true"
show_uptime="true"
show_shell="true"
show_os="true"
show_kernel="true"
show_wm="true"
show_packages="true"
show_disk="true"

# CPU
cpu_brand="true"
cpu_speed="false"       # hide actual CPU speed
cpu_cores="false"       # hide core count
cpu_temp="false"

# GPU
gpu_type="dedicated"
gpu_brand="true"

# Disk
disk_show=("/")

# Memory
memory_unit="MiB"
memory_percent="false"

# Shell
shell_version="true"
shell_path="false"

# Uptime
uptime_shorthand="true"

# Colors
colors=(1 2 3 4 5 6 7 8)
bold="true"
underline="true"

# ASCII / Image
ascii_distro="arch_small"
ascii_colors=(1 2 3 4 5 6 7 8)
ascii_bold="true"
image_backend="ascii"
image_source="auto"
image_loop="false"
gap=2

# Progress bars
bar_length=15
bar_char_elapsed="-"
bar_char_total="="
bar_color_elapsed="distro"
bar_color_total="distro"
cpu_display="false"
memory_display="false"
battery_display="false"
disk_display="false"

# Misc
stdout="false"
separator=":"

# Public IP (optional)
public_ip_host="http://ident.me"
public_ip_timeout=2
